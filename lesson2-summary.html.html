    <!-- JAVASCRIPT QUIZ ENGINE -->
    <script>
        const quizData = [
            {
                q: "1. ปริมาณใดต่อไปนี้จัดเป็นปริมาณเวกเตอร์ทั้งหมด?",
                options: ["1) ระยะทาง, อัตราเร็ว, ความเร่ง", "2) การกระจัด, ความเร็ว, ความเร่ง", "3) ระยะทาง, ความเร็ว, เวลา", "4) การกระจัด, อัตราเร็ว, เวลา"],
                ans: 2,
                exp: "การกระจัด ความเร็ว และความเร่ง เป็นปริมาณเวกเตอร์เพราะต้องระบุทั้งขนาดและทิศทาง"
            },
            {
                q: "2. วัตถุเคลื่อนที่เป็นวงกลมรัศมี 7 เมตร เมื่อเคลื่อนที่ครบหนึ่งรอบพอดี ระยะทางและการกระจัดเป็นเท่าใดตามลำดับ?",
                options: ["1) 0 m, 44 m", "2) 44 m, 0 m", "3) 22 m, 7 m", "4) 44 m, 14 m"],
                ans: 2,
                exp: "ระยะทาง = $2\\pi r = 2 \\times \\frac{22}{7} \\times 7 = 44$ m ส่วนการกระจัดเป็น 0 m เนื่องจากจุดเริ่มต้นและจุดสุดท้ายอยู่ที่เดียวกัน"
            },
            {
                q: "3. รถยนต์คันหนึ่งวิ่งด้วยอัตราเร็ว 72 km/h คิดเป็นกี่เมตรต่อวินาที (m/s)?",
                options: ["1) 15 m/s", "2) 20 m/s", "3) 25 m/s", "4) 30 m/s"],
                ans: 2,
                exp: "แปลงหน่วยโดยคูณ $\\frac{5}{18}$: $72 \\times \\frac{5}{18} = 20$ m/s"
            },
            {
                q: "4. วัตถุเริ่มเคลื่อนที่จากหยุดนิ่งด้วยความเร่งสม่ำเสมอ $2\\text{ m/s}^2$ เมื่อเวลาผ่านไป 5 วินาที วัตถุจะมีมีความเร็วเท่าใด?",
                options: ["1) 5 m/s", "2) 10 m/s", "3) 15 m/s", "4) 20 m/s"],
                ans: 2,
                exp: "ใช้สูตร $v = u + at = 0 + (2)(5) = 10$ m/s"
            },
            {
                q: "5. อนุภาคเคลื่อนที่แนวเส้นตรงด้วยความเร็วต้น 10 m/s และมีความเร่งคงที่ $3\\text{ m/s}^2$ ในเวลา 4 วินาที จะได้ระยะทางเท่าใด?",
                options: ["1) 40 m", "2) 54 m", "3) 64 m", "4) 70 m"],
                ans: 2,
                exp: "ใช้สูตร $s = ut + \\frac{1}{2}at^2 = (10)(4) + \\frac{1}{2}(3)(4^2) = 40 + 24 = 64$ m (ข้อนี้ตอบข้อ 3)"
            },
            {
                q: "6. รถยนต์เบรกอย่างกะทันหันขณะมีความเร็ว 20 m/s จนกระทั่งหยุดนิ่งในระยะทาง 40 เมตร ความเร่งของรถยนต์มีค่าเท่าใด?",
                options: ["1) $-5\\text{ m/s}^2$", "2) $-2.5\\text{ m/s}^2$", "3) $-10\\text{ m/s}^2$", "4) $-1.25\\text{ m/s}^2$"],
                ans: 1,
                exp: "ใช้สูตร $v^2 = u^2 + 2as \\rightarrow 0^2 = 20^2 + 2(a)(40) \\rightarrow 80a = -400 \\rightarrow a = -5\\text{ m/s}^2$"
            },
            {
                q: "7. ความชัน (Slope) ของกราฟความสัมพันธ์ระหว่างการกระจัดกับเวลา ($s-t$) แสดงถึงปริมาณใด?",
                options: ["1) ความเร่ง", "2) ความเร็ว", "3) ระยะทาง", "4) การกระจัดรวม"],
                ans: 2,
                exp: "ความชันของกราฟ $s-t$ คือ $\\frac{\\Delta s}{\\Delta t}$ ซึ่งตรงกับความเร็ว ($v$)"
            },
            {
                q: "8. พื้นที่ใต้กราฟความสัมพันธ์ระหว่างความเร็วกับเวลา ($v-t$) แสดงถึงปริมาณใด?",
                options: ["1) ความเร่ง", "2) ความเร็วเฉลี่ย", "3) การกระจัด", "4) แรงลัพธ์"],
                ans: 3,
                exp: "พื้นที่ใต้กราฟ $v-t$ คือผลคูณ $v \\times t$ ซึ่งแสดงถึงการกระจัด ($s$)"
            },
            {
                q: "9. กราฟ $v-t$ เป็นเส้นตรงขนานกับแกนเวลา (แกนนอน) แสดงว่าวัตถุมีการเคลื่อนที่อย่างไร?",
                options: ["1) หยุดนิ่ง", "2) เคลื่อนที่ด้วยความเร็วคงตัว", "3) เคลื่อนที่ด้วยความเร่งคงตัว", "4) เคลื่อนที่ด้วยความเร่งเพิ่มขึ้น"],
                ans: 2,
                exp: "เส้นตรงขนานแกนเวลาหมายถึงค่าความเร็ว $v$ ไม่เปลี่ยนแปลงตามเวลา จึงมีความเร็วคงตัว (ความเร่งเป็นศูนย์)"
            },
            {
                q: "10. ปล่อยวัตถุให้ตกแบบเสรีจากที่สูงภายใต้แรงโน้มถ่วงของโลก (กำหนด $g = 10\\text{ m/s}^2$) เมื่อเวลาผ่านไป 3 วินาที วัตถุตกลงมาได้ระยะทางเท่าใด?",
                options: ["1) 15 m", "2) 30 m", "3) 45 m", "4) 90 m"],
                ans: 3,
                exp: "ปล่อยตก $u = 0$, ใช้สูตร $s = ut + \\frac{1}{2}gt^2 = 0 + \\frac{1}{2}(10)(3^2) = 45$ m"
            },
            {
                q: "11.โยนก้อนหินขึ้นในแนวดีดด้วยความเร็วต้น 30 m/s ก้อนหินจะใช้เวลานานเท่าใดจึงจะขึ้นไปถึงจุดสูงสุด ($g = 10\\text{ m/s}^2$)?",
                options: ["1) 2 วินาที", "2) 3 วินาที", "3) 4 วินาที", "4) 6 วินาที"],
                ans: 2,
                exp: "ที่จุดสูงสุด $v = 0$, โยนขึ้น $g = -10\\text{ m/s}^2$: $v = u + gt \\rightarrow 0 = 30 - 10t \\rightarrow t = 3$ วินาที"
            },
            {
                q: "12. จากข้อ 11 ก้อนหินขึ้นไปได้สูงสุดจากจุดโยนเป็นระยะทางกี่เมตร?",
                options: ["1) 30 m", "2) 45 m", "3) 60 m", "4) 90 m"],
                ans: 2,
                exp: "ใช้สูตร $v^2 = u^2 + 2gs \\rightarrow 0 = 30^2 + 2(-10)s \\rightarrow 20s = 900 \\rightarrow s = 45$ m"
            },
            {
                q: "13. ขว้างลูกบอลลงมาจากหน้าผาด้วยความเร็วต้น 5 m/s เมื่อเวลาผ่านไป 2 วินาที ลูกบอลจะมีความเร็วเท่าใด ($g = 10\\text{ m/s}^2$)?",
                options: ["1) 15 m/s", "2) 20 m/s", "3) 25 m/s", "4) 30 m/s"],
                ans: 3,
                exp: "ขว้างลง $u = +5$ m/s, $g = +10\\text{ m/s}^2$: $v = u + gt = 5 + (10)(2) = 25$ m/s"
            },
            {
                q: "14. วัตถุ A และ B มีมวล $m$ และ $2m$ ตามลำดับ ถูกปล่อยให้ตกจากที่สูงเท่ากันในสุญญากาศ ข้อใดถูกต้อง?",
                options: ["1) วัตถุ B ตกถึงพื้นก่อนเพราะหนักกว่า", "2) วัตถุ A ตกถึงพื้นก่อนเพราะมวลน้อยกว่า", "3) ทั้งสองวัตถุตกถึงพื้นพร้อมกันด้วยความเร็วเท่ากัน", "4) วัตถุ B จะมีความเร่งมากกว่าวัตถุ A สองเท่า"],
                ans: 3,
                exp: "ในสุญญากาศ การตกแบบเสรีไม่ขึ้นกับมวลของวัตถุ วัตถุทั้งสองมีความเร่ง $g$ เท่ากัน จึงถึงพื้นพร้อมกัน"
            },
            {
                q: "15. วัตถุเคลื่อนที่ด้วยความเร็วคงที่ 15 m/s เป็นเวลา 12 วินาที จะได้ระยะทางทั้งหมดเท่าใด?",
                options: ["1) 120 m", "2) 150 m", "3) 180 m", "4) 200 m"],
                ans: 3,
                exp: "ความเร็วคงที่ใช้ $s = vt = 15 \\times 12 = 180$ m"
            },
            {
                q: "16. รถจักรยานยนต์เคลื่อนที่ชะลอความเร็วจาก 25 m/s จนหยุดนิ่ง ใช้เวลา 5 วินาที ขนาดความเร่งเฉลี่ยมีค่าเท่าใด?",
                options: ["1) $5\\text{ m/s}^2$", "2) $4\\text{ m/s}^2$", "3) $3\\text{ m/s}^2$", "4) $2\\text{ m/s}^2$"],
                ans: 1,
                exp: "ขนาดของความเร่ง $a = \\frac{|v - u|}{t} = \\frac{|0 - 25|}{5} = 5\\text{ m/s}^2$"
            },
            {
                q: "17. หากความชันของกราฟความเร่งกับเวลา ($a-t$) มีค่าเป็นศูนย์ แสดงว่าวัตถุมีความเร่งอย่างไร?",
                options: ["1) ความเร่งเป็นศูนย์", "2) ความเร่งคงตัว", "3) ความเร็วคงตัว", "4) วัตถุหยุดนิ่ง"],
                ans: 2,
                exp: "ความชันกราฟ $a-t$ เป็นศูนย์ หมายความว่าค่าความเร่ง $a$ มีค่าคงที่ไม่เปลี่ยนแปลง"
            },
            {
                q: "18. โยนวัตถุขึ้นในแนวดิ่ง ณ จุดสูงสุดของการเคลื่อนที่ ปริมาณใดต่อไปนี้ไม่เป็นศูนย์?",
                options: ["1) ความเร็ว", "2) การกระจัดจากจุดเริ่มต้น", "3) ความเร่ง", "4) ทั้งความเร็วและความเร่ง"],
                ans: 3,
                exp: "ณ จุดสูงสุด ความเร็ว $v = 0$ แต่ความเร่งยังมีค่าเท่ากับความเร่งเนื่องจากแรงโน้มถ่วง ($g \\approx 9.8$ หรือ $10\\text{ m/s}^2$) ชี้ลงเสมอ"
            },
            {
                q: "19. วัตถุเริ่มเคลื่อนที่จากหยุดนิ่ง ด้วยความเร่งคงตัว ในช่วงเวลา $t$ ได้ระยะทาง $S$ ถ้าเวลาผ่านไปเป็น $2t$ จะได้ระยะทางเป็นกี่เท่าของ $S$?",
                options: ["1) 2 เท่า", "2) 3 เท่า", "3) 4 เท่า", "4) 8 เท่า"],
                ans: 3,
                exp: "จาก $s = \\frac{1}{2}at^2$ ระยะทางแปรผันตรงกับ $t^2$ ดังนั้นเมื่อเวลาเป็น $2t$ ระยะทางจะเป็น $(2)^2 = 4$ เท่า"
            },
            {
                q: "20. รถยนต์คันหนึ่งเคลื่อนที่ได้ระยะทาง 100 เมตร ในเวลา 5 วินาที แล้วเคลื่อนที่ต่อได้อีก 200 เมตร ในเวลา 10 วินาที อัตราเร็วเฉลี่ยตลอดการเคลื่อนที่เป็นเท่าใด?",
                options: ["1) 15 m/s", "2) 20 m/s", "3) 25 m/s", "4) 30 m/s"],
                ans: 2,
                exp: "อัตราเร็วเฉลี่ย $v_{avg} = \\frac{\\text{ระยะทางรวม}}{\\text{เวลารวม}} = \\frac{100 + 200}{5 + 10} = \\frac{300}{15} = 20$ m/s"
            }
        ];

        // แก้ไขคำตอบข้อ 5 ให้ตรงกับ Index ที่ถูกต้อง
        quizData[4].ans = 3;

        // ฟังก์ชันสร้างโจทย์ HTML
        function renderQuiz() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            quizData.forEach((q, idx) => {
                const qCard = document.createElement('div');
                qCard.className = 'bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition';
                
                let optionsHTML = '';
                q.options.forEach((opt, oIdx) => {
                    const optNum = oIdx + 1;
                    optionsHTML += `
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:bg-blue-50/50 cursor-pointer transition">
                            <input type="radio" name="q${idx}" value="${optNum}" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                            <span class="text-slate-700 text-sm font-medium">${opt}</span>
                        </label>
                    `;
                });

                qCard.innerHTML = `
                    <h3 class="font-bold text-slate-900 mb-4 text-base sm:text-lg">${q.q}</h3>
                    <div class="space-y-2 mb-4">${optionsHTML}</div>
                    <div id="exp-${idx}" class="hidden mt-4 p-4 rounded-xl text-sm border"></div>
                `;
                container.appendChild(qCard);
            });

            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        // ฟังก์ชันตรวจคะแนน
        function checkAnswers() {
            let score = 0;

            quizData.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                const expBox = document.getElementById(`exp-${idx}`);
                expBox.classList.remove('hidden');

                if (selected && parseInt(selected.value) === q.ans) {
                    score++;
                    expBox.className = "mt-4 p-4 rounded-xl text-sm border bg-emerald-50 border-emerald-200 text-emerald-800";
                    expBox.innerHTML = `<strong>✓ ถูกต้อง!</strong> ${q.exp}`;
                } else {
                    expBox.className = "mt-4 p-4 rounded-xl text-sm border bg-rose-50 border-rose-200 text-rose-800";
                    expBox.innerHTML = `<strong>✕ ยังไม่ถูกต้อง (ตอบข้อ ${q.ans})</strong><br>${q.exp}`;
                }
            });

            document.getElementById('score-display').innerText = score;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // เรียกใช้งานเมื่อโหลดหน้าเว็บ
        window.onload = renderQuiz;
    </script>
</body>
</html>
